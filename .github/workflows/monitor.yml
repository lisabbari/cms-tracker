name: CMS Model Monitor

on:
  schedule:
    # Runs daily at 6am ET (11:00 UTC) and 5pm ET (22:00 UTC)
    - cron: "0 11 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run CMS monitor
        run: python cms_monitor.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          # change_log.json may not exist on first run (no changes yet)
          [ -f change_log.json ] && git add change_log.json || true
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +%Y-%m-%d)"
          git push
